<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaykeyfearVPN — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: oklch(0.12 0.01 250);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Grotesk', sans-serif;
  padding: 40px 20px;
  gap: 40px;
  flex-wrap: wrap;
}

@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.6; }
  70% { transform: scale(1.15); opacity: 0; }
  100% { transform: scale(1.15); opacity: 0; }
}
@keyframes pulse-ring2 {
  0% { transform: scale(1); opacity: 0.3; }
  70% { transform: scale(1.28); opacity: 0; }
  100% { transform: scale(1.28); opacity: 0; }
}
@keyframes spin-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes data-tick {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
@keyframes spin-arc {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes connecting-glow {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 1; }
}
@keyframes ping-pulse {
  0%, 100% { opacity: 0.3; transform: scaleY(1); }
  50%       { opacity: 1;   transform: scaleY(1.3); }
}
.label {
  color: oklch(0.6 0.01 250);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
  margin-top: 8px;
}
</style>
</head>
<body>

<script type="text/babel">
// ─── Tokens ───────────────────────────────────────────────────────────
const C = {
  bg:       'oklch(0.10 0.015 255)',
  surface:  'oklch(0.15 0.015 255)',
  surface2: 'oklch(0.19 0.015 255)',
  border:   'oklch(0.22 0.015 255)',
  text:     'oklch(0.95 0.005 250)',
  muted:    'oklch(0.55 0.01 250)',
  accent:   'oklch(0.76 0.17 165)',   // cyan-green
  accentDim:'oklch(0.30 0.10 165)',
  accentGlow:'oklch(0.76 0.17 165)',
  blue:     'oklch(0.65 0.18 240)',
  blueDim:  'oklch(0.25 0.10 240)',
  danger:   'oklch(0.65 0.18 25)',
  awg:      'oklch(0.68 0.16 145)',   // AmneziaWG green
};

// ─── Icons (inline SVG) ───────────────────────────────────────────────
const Icon = ({ name, size=20, color='currentColor', ...p }) => {
  const paths = {
    home: <><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke={color} strokeWidth="1.6" fill="none"/><path d="M9 21V12h6v9" stroke={color} strokeWidth="1.6" fill="none"/></>,
    servers: <><rect x="2" y="4" width="20" height="5" rx="1.5" stroke={color} strokeWidth="1.6" fill="none"/><rect x="2" y="11" width="20" height="5" rx="1.5" stroke={color} strokeWidth="1.6" fill="none"/><circle cx="6" cy="6.5" r="1" fill={color}/><circle cx="6" cy="13.5" r="1" fill={color}/></>,
    import: <><path d="M12 2v12m0 0l-4-4m4 4l4-4" stroke={color} strokeWidth="1.6" strokeLinecap="round"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke={color} strokeWidth="1.6" strokeLinecap="round"/></>,
    settings: <><circle cx="12" cy="12" r="3" stroke={color} strokeWidth="1.6" fill="none"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke={color} strokeWidth="1.6" strokeLinecap="round"/></>,
    lock: <><rect x="5" y="11" width="14" height="10" rx="2" stroke={color} strokeWidth="1.6" fill="none"/><path d="M8 11V7a4 4 0 018 0v4" stroke={color} strokeWidth="1.6" strokeLinecap="round"/><circle cx="12" cy="16" r="1.5" fill={color}/></>,
    unlock: <><rect x="5" y="11" width="14" height="10" rx="2" stroke={color} strokeWidth="1.6" fill="none"/><path d="M8 11V7a4 4 0 018 0" stroke={color} strokeWidth="1.6" strokeLinecap="round"/><circle cx="12" cy="16" r="1.5" fill={color}/></>,
    arrow: <path d="M5 12h14m-5-5l5 5-5 5" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    down: <path d="M12 4v16m0 0l-4-4m4 4l4-4" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>,
    up: <path d="M12 20V4m0 0l-4 4m4-4l4 4" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>,
    check: <path d="M5 12l5 5L19 7" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    trash: <><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke={color} strokeWidth="1.6" strokeLinecap="round" fill="none"/></>,
    clipboard: <><rect x="8" y="2" width="8" height="4" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><path d="M8 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V4a2 2 0 00-2-2h-2" stroke={color} strokeWidth="1.5" fill="none"/></>,
    file: <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke={color} strokeWidth="1.5" fill="none"/><path d="M14 2v6h6" stroke={color} strokeWidth="1.5"/></>,
    qr: <><rect x="3" y="3" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="5" y="5" width="3" height="3" fill={color}/><rect x="16" y="5" width="3" height="3" fill={color}/><rect x="5" y="16" width="3" height="3" fill={color}/><path d="M14 14h3v3h-3zm4 0h3m-3 3v3h3v-3" stroke={color} strokeWidth="1.5" fill="none"/></>,
    globe: <><circle cx="12" cy="12" r="9" stroke={color} strokeWidth="1.5" fill="none"/><path d="M12 3c-2 3-3 5.5-3 9s1 6 3 9M12 3c2 3 3 5.5 3 9s-1 6-3 9M3 12h18" stroke={color} strokeWidth="1.3"/></>,
    shield: <path d="M12 2L4 5v7c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5V5l-8-3z" stroke={color} strokeWidth="1.6" fill="none" strokeLinejoin="round"/>,
    toggle: <><rect x="1" y="6" width="22" height="12" rx="6" fill={color}/><circle cx="17" cy="12" r="4.5" fill="white"/></>,
    toggleOff: <><rect x="1" y="6" width="22" height="12" rx="6" fill="oklch(0.30 0.01 250)"/><circle cx="7" cy="12" r="4.5" fill="oklch(0.55 0.01 250)"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" {...p}>
      {paths[name]}
    </svg>
  );
};

// ─── Bottom Nav ───────────────────────────────────────────────────────
const NavBar = ({ active, onTab }) => {
  const tabs = [
    { id: 'home', label: 'Home' },
    { id: 'servers', label: 'Servers' },
    { id: 'import', label: 'Import' },
    { id: 'settings', label: 'Settings' },
  ];
  return (
    <div style={{
      display: 'flex',
      borderTop: `1px solid ${C.border}`,
      background: C.surface,
      padding: '6px 0 2px',
    }}>
      {tabs.map(t => {
        const isActive = active === t.id;
        return (
          <button key={t.id} onClick={() => onTab(t.id)} style={{
            flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
            gap: 3, background: 'none', border: 'none', cursor: 'pointer',
            padding: '4px 0 8px',
            color: isActive ? C.accent : C.muted,
          }}>
            {isActive && (
              <div style={{
                width: 28, height: 3, borderRadius: 2,
                background: C.accent, marginBottom: 2,
              }}/>
            )}
            <Icon name={t.id === 'import' ? 'import' : t.id} size={22} color={isActive ? C.accent : C.muted}/>
            <span style={{ fontSize: 10, fontWeight: 500 }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
};

// ─── IP masking helper ────────────────────────────────────────────────
const maskIP = (addr) => {
  // addr like "138.124.28.204:443" → "138.124.*.*:443"
  return addr.replace(
    /^(\d+\.\d+)\.\d+\.\d+(:\d+)?$/,
    (_, prefix, port) => `${prefix}.*.*${port || ''}`
  );
};

// ─── HOME SCREEN ──────────────────────────────────────────────────────
const HomeScreen = ({ connected, onToggle }) => {
  const [phase, setPhase] = React.useState(connected ? 'on' : 'off');
  // phase: 'on' | 'off' | 'connecting' | 'disconnecting'

  const handleToggle = () => {
    if (phase === 'on') {
      setPhase('disconnecting');
      setTimeout(() => { setPhase('off'); onToggle(); }, 1600);
    } else if (phase === 'off') {
      setPhase('connecting');
      setTimeout(() => { setPhase('on'); onToggle(); }, 2000);
    }
  };

  const isConnected = phase === 'on';
  const isTransitioning = phase === 'connecting' || phase === 'disconnecting';

  const statusColor = isConnected ? C.accent : isTransitioning ? 'oklch(0.75 0.15 60)' : C.muted;
  const statusText = {
    on: '● Connected · VLESS',
    off: '○ Disconnected',
    connecting: '◎ Connecting…',
    disconnecting: '◎ Disconnecting…',
  }[phase];

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      padding: '28px 20px 16px', gap: 20,
      background: C.bg, overflowY: 'auto',
    }}>
      {/* Title */}
      <div style={{ textAlign: 'center' }}>
        <div style={{
          fontSize: 22, fontWeight: 700, color: C.text,
          letterSpacing: '-0.02em',
        }}>PaykeyfearVPN</div>
        <div style={{
          fontSize: 13, fontWeight: 500,
          color: statusColor,
          marginTop: 3, letterSpacing: '0.03em',
          transition: 'color 0.3s',
        }}>
          {statusText}
        </div>
      </div>

      {/* Big connect button */}
      <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', paddingTop: 12, paddingBottom: 12 }}>
        <div style={{ position: 'relative', width: 168, height: 168 }}>

          {/* Pulse rings when connected */}
          {isConnected && <>
            <div style={{
              position: 'absolute', inset: 0, borderRadius: '50%',
              border: `2px solid ${C.accent}`,
              animation: 'pulse-ring 2.4s ease-out infinite',
            }}/>
            <div style={{
              position: 'absolute', inset: 0, borderRadius: '50%',
              border: `2px solid ${C.accent}`,
              animation: 'pulse-ring2 2.4s ease-out 0.6s infinite',
            }}/>
          </>}

          {/* Spinning arc when transitioning */}
          {isTransitioning && (
            <svg style={{ position: 'absolute', inset: 0, animation: 'spin-arc 1s linear infinite' }}
              width="168" height="168" viewBox="0 0 168 168">
              <circle cx="84" cy="84" r="80" fill="none"
                stroke="oklch(0.75 0.15 60)"
                strokeWidth="3"
                strokeDasharray="120 400"
                strokeLinecap="round"
              />
            </svg>
          )}

          {/* Button */}
          <button onClick={handleToggle} disabled={isTransitioning} style={{
            position: 'absolute', inset: 10,
            borderRadius: '50%', border: 'none',
            cursor: isTransitioning ? 'default' : 'pointer',
            background: isConnected
              ? `radial-gradient(circle at 35% 30%, oklch(0.25 0.12 165), oklch(0.14 0.08 165))`
              : isTransitioning
              ? `radial-gradient(circle at 35% 30%, oklch(0.22 0.08 60), oklch(0.13 0.04 60))`
              : `radial-gradient(circle at 35% 30%, oklch(0.20 0.02 255), oklch(0.13 0.02 255))`,
            boxShadow: isConnected
              ? `0 0 0 2px ${C.accentDim}, 0 0 40px oklch(0.50 0.14 165 / 0.4), inset 0 1px 0 oklch(0.55 0.14 165 / 0.3)`
              : isTransitioning
              ? `0 0 0 2px oklch(0.40 0.10 60), 0 0 30px oklch(0.50 0.14 60 / 0.3)`
              : `0 0 0 2px ${C.border}, inset 0 1px 0 oklch(0.30 0.01 255 / 0.3)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            transition: 'all 0.5s ease',
            animation: isTransitioning ? 'connecting-glow 1s ease-in-out infinite' : 'none',
          }}>
            <Icon
              name={isConnected ? 'lock' : 'unlock'}
              size={44}
              color={isConnected ? C.accent : isTransitioning ? 'oklch(0.75 0.15 60)' : C.muted}
            />
          </button>

          {/* Outer ring */}
          {!isTransitioning && (
            <svg style={{ position: 'absolute', inset: 0 }} width="168" height="168" viewBox="0 0 168 168">
              <circle cx="84" cy="84" r="82" fill="none"
                stroke={isConnected ? C.accent : C.border}
                strokeWidth={isConnected ? "2" : "1"}
                strokeDasharray={isConnected ? "none" : "6 4"}
                opacity={isConnected ? 0.8 : 0.5}
              />
            </svg>
          )}
        </div>
      </div>

      {/* Server card */}
      <div style={{
        background: C.surface, borderRadius: 16,
        border: `1px solid ${C.border}`,
        padding: '14px 16px',
        display: 'flex', alignItems: 'center', gap: 12,
      }}>
        <div style={{
          width: 36, height: 36, borderRadius: 10,
          background: C.blueDim, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon name="globe" size={18} color={C.blue}/>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>@Paykeyfear</div>
          <div style={{ fontSize: 12, color: C.blue, fontWeight: 500, marginTop: 1 }}>VLESS · {maskIP('138.124.28.204:443')}</div>
        </div>
        <Icon name="arrow" size={18} color={C.muted}/>
      </div>

      {/* Traffic stats — only when connected */}
      {isConnected && (
        <div style={{
          background: `linear-gradient(135deg, oklch(0.18 0.06 240), oklch(0.15 0.04 255))`,
          borderRadius: 16, border: `1px solid oklch(0.28 0.08 240)`,
          padding: '14px 20px',
          display: 'flex', justifyContent: 'space-around', alignItems: 'center',
        }}>
          {[
            { icon: 'down', val: '528.7', unit: 'MiB', color: C.accent },
            { icon: 'up', val: '394.9', unit: 'MiB', color: C.blue },
          ].map(({ icon, val, unit, color }) => (
            <div key={icon} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <Icon name={icon} size={16} color={color}/>
              <div style={{ fontSize: 18, fontWeight: 700, color: C.text, letterSpacing: '-0.02em' }}>
                {val} <span style={{ fontSize: 12, fontWeight: 500, color: C.muted }}>{unit}</span>
              </div>
            </div>
          ))}
          <div style={{ width: 1, height: 32, background: C.border }}/>
        </div>
      )}

      {/* Split tunnel card */}
      <div style={{
        background: C.surface, borderRadius: 16,
        border: `1px solid ${C.border}`,
        padding: '14px 16px',
        display: 'flex', alignItems: 'center', gap: 12,
      }}>
        <div style={{
          width: 36, height: 36, borderRadius: 10,
          background: 'oklch(0.20 0.02 250)', display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon name="shield" size={18} color={C.muted}/>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>Раздельный туннель</div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>Выкл · Через туннель идёт трафик всех приложений</div>
        </div>
        <Icon name="arrow" size={18} color={C.muted}/>
      </div>
    </div>
  );
};

// ─── PING BAR ─────────────────────────────────────────────────────────
const PingBar = ({ ping }) => {
  // ping: null = measuring, number = ms
  if (ping === null) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{
            width: 3, height: 10 + i * 4, borderRadius: 2,
            background: C.border,
            animation: `ping-pulse 1s ${i * 0.2}s ease-in-out infinite`,
          }}/>
        ))}
      </div>
    );
  }
  const color = ping < 80 ? C.accent : ping < 180 ? 'oklch(0.78 0.17 80)' : 'oklch(0.65 0.18 25)';
  const bars = ping < 80 ? 3 : ping < 180 ? 2 : 1;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 3 }}>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 2 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{
            width: 3, height: 8 + i * 4, borderRadius: 2,
            background: i < bars ? color : C.border,
            transition: 'background 0.3s',
          }}/>
        ))}
      </div>
      <div style={{ fontSize: 10, fontWeight: 600, color, letterSpacing: '-0.01em' }}>
        {ping} мс
      </div>
    </div>
  );
};

// ─── SERVERS SCREEN ───────────────────────────────────────────────────
const ServersScreen = () => {
  const [sel, setSel] = React.useState(0);
  const [pings, setPings] = React.useState({ 0: null, 1: null });
  const [checking, setChecking] = React.useState(false);

  const servers = [
    { name: '@Paykeyfear', protocol: 'VLESS', addr: '138.124.28.204:443', color: C.blue },
    { name: 'pasted', protocol: 'AmneziaWG 2.0', addr: '138.124.28.204:37281', color: C.awg },
  ];

  // Simulate ping measurement on mount
  React.useEffect(() => {
    const fakePings = [42, 118];
    servers.forEach((_, i) => {
      setTimeout(() => {
        setPings(p => ({ ...p, [i]: fakePings[i] }));
      }, 800 + i * 600);
    });
  }, []);

  const refreshPings = () => {
    if (checking) return;
    setChecking(true);
    setPings({ 0: null, 1: null });
    const newPings = [
      30 + Math.floor(Math.random() * 120),
      80 + Math.floor(Math.random() * 200),
    ];
    servers.forEach((_, i) => {
      setTimeout(() => {
        setPings(p => ({ ...p, [i]: newPings[i] }));
        if (i === servers.length - 1) setChecking(false);
      }, 700 + i * 500);
    });
  };

  return (
    <div style={{ flex: 1, padding: '20px 16px', background: C.bg, display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 4 }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: C.text, flex: 1 }}>Серверы</div>
        <button onClick={refreshPings} style={{
          background: checking ? C.accentDim : 'oklch(0.18 0.02 255)',
          border: `1px solid ${checking ? C.accent : C.border}`,
          borderRadius: 10, padding: '6px 12px',
          display: 'flex', alignItems: 'center', gap: 6,
          cursor: checking ? 'default' : 'pointer',
          color: checking ? C.accent : C.muted,
          fontSize: 11, fontWeight: 600,
          fontFamily: 'Space Grotesk, sans-serif',
          transition: 'all 0.2s',
        }}>
          <svg width="12" height="12" viewBox="0 0 24 24"
            style={{ animation: checking ? 'spin-arc 1s linear infinite' : 'none' }}>
            <path d="M4 12a8 8 0 018-8V2l4 4-4 4V8a6 6 0 100 6" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round"/>
          </svg>
          {checking ? 'Проверка…' : 'Пинг'}
        </button>
      </div>

      {servers.map((s, i) => (
        <div key={i} onClick={() => setSel(i)} style={{
          background: sel === i ? `oklch(0.17 0.04 240)` : C.surface,
          border: `1px solid ${sel === i ? 'oklch(0.35 0.10 240)' : C.border}`,
          borderRadius: 16, padding: '14px 16px',
          display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer',
          transition: 'all 0.2s',
        }}>
          {/* Radio */}
          <div style={{
            width: 22, height: 22, borderRadius: '50%',
            border: `2px solid ${sel === i ? C.accent : C.border}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0,
          }}>
            {sel === i && <div style={{ width: 10, height: 10, borderRadius: '50%', background: C.accent }}/>}
          </div>

          {/* Info */}
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{s.name}</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 4 }}>
              <span style={{
                fontSize: 10, fontWeight: 600, color: s.color,
                background: `color-mix(in oklch, ${s.color} 15%, transparent)`,
                padding: '2px 8px', borderRadius: 6,
              }}>{s.protocol}</span>
              <span style={{ fontSize: 11, color: C.muted }}>{maskIP(s.addr)}</span>
            </div>
          </div>

          {/* Ping indicator */}
          <PingBar ping={pings[i]}/>

          <button style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4, marginLeft: 4 }}>
            <Icon name="trash" size={18} color='oklch(0.65 0.14 25)'/>
          </button>
        </div>
      ))}

      {/* Legend */}
      <div style={{
        display: 'flex', gap: 14, padding: '8px 4px',
        borderTop: `1px solid ${C.border}`, marginTop: 4,
      }}>
        {[
          { color: C.accent, label: '< 80 мс — отлично' },
          { color: 'oklch(0.78 0.17 80)', label: '< 180 мс — норма' },
          { color: 'oklch(0.65 0.18 25)', label: '> 180 мс — медленно' },
        ].map(({ color, label }) => (
          <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: color, flexShrink: 0 }}/>
            <span style={{ fontSize: 10, color: C.muted }}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── IMPORT SCREEN ────────────────────────────────────────────────────
const ImportScreen = () => {
  const [text, setText] = React.useState('');
  const [activeMethod, setActiveMethod] = React.useState(null);
  const [focused, setFocused] = React.useState(false);

  const hasText = text.trim().length > 0;

  const methods = [
    {
      id: 'clipboard',
      icon: 'clipboard',
      label: 'Буфер обмена',
      sub: 'Вставить скопированную ссылку',
    },
    {
      id: 'file',
      icon: 'file',
      label: 'Файл',
      sub: 'Открыть .conf или .json',
    },
    {
      id: 'qr',
      icon: 'qr',
      label: 'QR-код',
      sub: 'Сканировать камерой',
    },
  ];

  return (
    <div style={{
      flex: 1, background: C.bg,
      display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
    }}>
      {/* ── Header ── */}
      <div style={{
        padding: '22px 20px 0',
        display: 'flex', flexDirection: 'column', gap: 2,
      }}>
        <div style={{ fontSize: 20, fontWeight: 700, color: C.text, letterSpacing: '-0.02em' }}>
          Импорт конфигурации
        </div>
        <div style={{ fontSize: 12, color: C.muted }}>
          vless://, hysteria2://, amnezia://
        </div>
      </div>

      {/* ── Spacer ── */}
      <div style={{ flex: 1 }}/>

      {/* ── Method cards ── */}
      <div style={{ padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        {methods.map((m) => {
          const isActive = activeMethod === m.id;
          return (
            <button key={m.id}
              onClick={() => setActiveMethod(isActive ? null : m.id)}
              style={{
                display: 'flex', alignItems: 'center', gap: 14,
                padding: '13px 16px', borderRadius: 16, border: 'none',
                cursor: 'pointer', textAlign: 'left',
                background: isActive
                  ? `linear-gradient(135deg, oklch(0.18 0.08 165), oklch(0.14 0.05 200))`
                  : C.surface,
                boxShadow: isActive
                  ? `0 0 0 1.5px ${C.accent}, 0 4px 20px oklch(0.50 0.14 165 / 0.15)`
                  : `0 0 0 1px ${C.border}`,
                transition: 'all 0.2s ease',
                fontFamily: 'Space Grotesk, sans-serif',
              }}>
              {/* Icon bubble */}
              <div style={{
                width: 42, height: 42, borderRadius: 12, flexShrink: 0,
                background: isActive ? C.accentDim : 'oklch(0.20 0.02 255)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'all 0.2s',
              }}>
                <Icon name={m.icon} size={20} color={isActive ? C.accent : C.muted}/>
              </div>
              {/* Labels */}
              <div style={{ flex: 1 }}>
                <div style={{
                  fontSize: 14, fontWeight: 600,
                  color: isActive ? C.accent : C.text,
                  transition: 'color 0.2s',
                }}>{m.label}</div>
                <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{m.sub}</div>
              </div>
              {/* Arrow */}
              <div style={{
                width: 28, height: 28, borderRadius: 8,
                background: isActive ? C.accentDim : 'oklch(0.20 0.02 255)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'all 0.2s',
              }}>
                <Icon name="arrow" size={14} color={isActive ? C.accent : C.muted}/>
              </div>
            </button>
          );
        })}
      </div>

      {/* ── Divider with OR ── */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '14px 20px',
      }}>
        <div style={{ flex: 1, height: 1, background: C.border }}/>
        <span style={{ fontSize: 11, color: C.muted, fontWeight: 500, letterSpacing: '0.06em' }}>
          ИЛИ ВСТАВЬТЕ ТЕКСТ
        </span>
        <div style={{ flex: 1, height: 1, background: C.border }}/>
      </div>

      {/* ── Textarea ── */}
      <div style={{ padding: '0 16px', position: 'relative' }}>
        <textarea
          value={text}
          onChange={e => setText(e.target.value)}
          onFocus={() => setFocused(true)}
          onBlur={() => setFocused(false)}
          placeholder="vless://... или полную конфигурацию"
          style={{
            width: '100%',
            background: focused ? 'oklch(0.17 0.02 255)' : C.surface,
            border: `1.5px solid ${focused ? C.accent : hasText ? 'oklch(0.35 0.08 165)' : C.border}`,
            borderRadius: 16, padding: '14px 14px 40px',
            color: C.text, fontSize: 12,
            fontFamily: 'monospace',
            resize: 'none', height: 90, outline: 'none',
            lineHeight: 1.6, boxSizing: 'border-box',
            transition: 'border-color 0.2s, background 0.2s',
          }}
        />
        {/* char count */}
        {text.length > 0 && (
          <div style={{
            position: 'absolute', bottom: 10, right: 26,
            fontSize: 10, color: C.muted, fontWeight: 500,
          }}>{text.length} симв.</div>
        )}
        {/* clear btn */}
        {hasText && (
          <button onClick={() => setText('')} style={{
            position: 'absolute', top: 10, right: 26,
            background: C.border, border: 'none', borderRadius: 6,
            width: 20, height: 20, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: C.muted, fontSize: 13, lineHeight: 1,
          }}>×</button>
        )}
      </div>

      {/* ── Import button ── */}
      <div style={{ padding: '12px 16px 16px' }}>
        <button style={{
          width: '100%', padding: '15px', borderRadius: 16, border: 'none',
          cursor: hasText ? 'pointer' : 'default',
          background: hasText
            ? `linear-gradient(135deg, ${C.accent}, oklch(0.65 0.18 195))`
            : 'oklch(0.17 0.01 255)',
          boxShadow: hasText
            ? `0 4px 24px oklch(0.50 0.14 165 / 0.35)`
            : 'none',
          color: hasText ? '#000' : C.muted,
          fontSize: 15, fontWeight: 700,
          fontFamily: 'Space Grotesk, sans-serif',
          letterSpacing: '-0.01em',
          transition: 'all 0.25s ease',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          {hasText ? (
            <>
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path d="M12 4v12m0 0l-4-4m4 4l4-4" stroke="#000" strokeWidth="2.2" strokeLinecap="round" fill="none"/>
                <path d="M4 20h16" stroke="#000" strokeWidth="2.2" strokeLinecap="round"/>
              </svg>
              Импортировать
            </>
          ) : (
            'Выберите метод или вставьте ссылку'
          )}
        </button>
      </div>
    </div>
  );
};

// ─── SETTINGS SCREEN ──────────────────────────────────────────────────
const SettingsScreen = () => {
  const [dynTheme, setDynTheme] = React.useState(true);
  const [autoConnect, setAutoConnect] = React.useState(false);
  const rows = [
    { label: 'Динамическая тема', sub: 'Использовать палитру Material You из системы', toggle: true, val: dynTheme, set: setDynTheme },
    { label: 'Подключаться при загрузке', sub: 'Автоматически запускать туннель после перезагрузки', toggle: true, val: autoConnect, set: setAutoConnect },
    { label: 'Раздельный туннель', sub: 'Выберите приложения, трафик которых идёт через VPN', arrow: true },
    { label: 'Политика конфиденциальности', sub: 'Что PaykeyfearVPN делает с вашими данными', arrow: true },
    { label: 'Журнал', sub: 'Последние записи журнала в памяти', arrow: true },
    { label: 'О приложении', sub: 'Версия 0.1.0-debug', arrow: true },
  ];
  return (
    <div style={{ flex: 1, background: C.bg, overflowY: 'auto' }}>
      <div style={{ padding: '20px 16px 8px', fontSize: 18, fontWeight: 700, color: C.text }}>Настройки</div>
      {rows.map((r, i) => (
        <div key={i} style={{
          padding: '14px 16px',
          borderBottom: `1px solid ${C.border}`,
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 500, color: C.text }}>{r.label}</div>
            <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{r.sub}</div>
          </div>
          {r.toggle && (
            <div onClick={() => r.set(!r.val)} style={{ cursor: 'pointer' }}>
              <svg width="48" height="24" viewBox="0 0 24 12">
                <rect x="0" y="0" width="24" height="12" rx="6"
                  fill={r.val ? C.accent : 'oklch(0.25 0.01 250)'}/>
                <circle cx={r.val ? "18" : "6"} cy="6" r="4.5" fill="white"
                  style={{ transition: 'cx 0.2s' }}/>
              </svg>
            </div>
          )}
          {r.arrow && <Icon name="arrow" size={18} color={C.muted}/>}
        </div>
      ))}
    </div>
  );
};

// ─── APP ──────────────────────────────────────────────────────────────
const App = () => {
  const [tab, setTab] = React.useState('home');
  const [connected, setConnected] = React.useState(true);

  const screens = {
    home: <HomeScreen connected={connected} onToggle={() => setConnected(c => !c)}/>,
    servers: <ServersScreen/>,
    import: <ImportScreen/>,
    settings: <SettingsScreen/>,

  return (
    <AndroidDevice statusBarDark={true}>
      <div style={{
        height: '100%', display: 'flex', flexDirection: 'column',
        background: C.bg, fontFamily: 'Space Grotesk, sans-serif',
      }}>
        {screens[tab]}
        <NavBar active={tab} onTab={setTab}/>
      </div>
    </AndroidDevice>
  );
};
