<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaykeyfearVPN — Redesign v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: oklch(0.09 0.015 255);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  font-family: 'Space Grotesk', sans-serif;
  padding: 40px 24px 60px;
  gap: 48px;
  flex-wrap: wrap;
}
@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.6; }
  70% { transform: scale(1.15); opacity: 0; }
  100% { transform: scale(1.15); opacity: 0; }
}
@keyframes pulse-ring2 {
  0% { transform: scale(1); opacity: 0.3; }
  70% { transform: scale(1.28); opacity: 0; }
  100% { transform: scale(1.28); opacity: 0; }
}
@keyframes spin-arc {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes connecting-glow {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 1; }
}
@keyframes ping-pulse {
  0%, 100% { opacity: 0.3; transform: scaleY(1); }
  50%       { opacity: 1;   transform: scaleY(1.3); }
}
@keyframes sheet-up {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slide-in-right {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.label {
  color: oklch(0.55 0.01 250);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>
<body>
<script type="text/babel">

/* ══════════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════════ */
const C = {
  bg:        'oklch(0.10 0.015 255)',
  surface:   'oklch(0.15 0.015 255)',
  surface2:  'oklch(0.19 0.015 255)',
  border:    'oklch(0.22 0.015 255)',
  text:      'oklch(0.95 0.005 250)',
  muted:     'oklch(0.55 0.01 250)',
  accent:    'oklch(0.76 0.17 165)',
  accentDim: 'oklch(0.30 0.10 165)',
  blue:      'oklch(0.65 0.18 240)',
  blueDim:   'oklch(0.25 0.10 240)',
  danger:    'oklch(0.65 0.18 25)',
  dangerDim: 'oklch(0.22 0.08 25)',
  awg:       'oklch(0.68 0.16 145)',
  amber:     'oklch(0.78 0.17 80)',
};

/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */
const maskIP = addr =>
  addr.replace(/^(\d+\.\d+)\.\d+\.\d+(:\d+)?$/, (_, p, port) => `${p}.*.*${port||''}`);

const maskUUID = uuid =>
  uuid.slice(0,8) + '-****-****-****-' + uuid.slice(-4);

const fmtTime = s => {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return [h,m,sec].map(v=>String(v).padStart(2,'0')).join(':');
};

/* ══════════════════════════════════════════════════════
   ICONS
══════════════════════════════════════════════════════ */
const Icon = ({ name, size=20, color='currentColor' }) => {
  const d = {
    home:      <><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke={color} strokeWidth="1.6" fill="none"/><path d="M9 21V12h6v9" stroke={color} strokeWidth="1.6" fill="none"/></>,
    servers:   <><rect x="2" y="4" width="20" height="5" rx="1.5" stroke={color} strokeWidth="1.6" fill="none"/><rect x="2" y="11" width="20" height="5" rx="1.5" stroke={color} strokeWidth="1.6" fill="none"/><circle cx="6" cy="6.5" r="1" fill={color}/><circle cx="6" cy="13.5" r="1" fill={color}/></>,
    import:    <><path d="M12 2v12m0 0l-4-4m4 4l4-4" stroke={color} strokeWidth="1.6" strokeLinecap="round"/><path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke={color} strokeWidth="1.6" strokeLinecap="round"/></>,
    settings:  <><circle cx="12" cy="12" r="3" stroke={color} strokeWidth="1.6" fill="none"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke={color} strokeWidth="1.6" strokeLinecap="round"/></>,
    lock:      <><rect x="5" y="11" width="14" height="10" rx="2" stroke={color} strokeWidth="1.6" fill="none"/><path d="M8 11V7a4 4 0 018 0v4" stroke={color} strokeWidth="1.6" strokeLinecap="round"/><circle cx="12" cy="16" r="1.5" fill={color}/></>,
    unlock:    <><rect x="5" y="11" width="14" height="10" rx="2" stroke={color} strokeWidth="1.6" fill="none"/><path d="M8 11V7a4 4 0 018 0" stroke={color} strokeWidth="1.6" strokeLinecap="round"/><circle cx="12" cy="16" r="1.5" fill={color}/></>,
    arrow:     <path d="M5 12h14m-5-5l5 5-5 5" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    arrowLeft: <path d="M19 12H5m5 5l-5-5 5-5" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    down:      <path d="M12 4v16m0 0l-4-4m4 4l4-4" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>,
    up:        <path d="M12 20V4m0 0l-4 4m4-4l4 4" stroke={color} strokeWidth="1.6" strokeLinecap="round"/>,
    trash:     <><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke={color} strokeWidth="1.6" strokeLinecap="round" fill="none"/></>,
    clipboard: <><rect x="8" y="2" width="8" height="4" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><path d="M8 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V4a2 2 0 00-2-2h-2" stroke={color} strokeWidth="1.5" fill="none"/></>,
    file:      <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke={color} strokeWidth="1.5" fill="none"/><path d="M14 2v6h6" stroke={color} strokeWidth="1.5"/></>,
    qr:        <><rect x="3" y="3" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="14" y="3" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="3" y="14" width="7" height="7" rx="1" stroke={color} strokeWidth="1.5" fill="none"/><rect x="5" y="5" width="3" height="3" fill={color}/><rect x="16" y="5" width="3" height="3" fill={color}/><rect x="5" y="16" width="3" height="3" fill={color}/><path d="M14 14h3v3h-3zm4 0h3m-3 3v3h3v-3" stroke={color} strokeWidth="1.5" fill="none"/></>,
    globe:     <><circle cx="12" cy="12" r="9" stroke={color} strokeWidth="1.5" fill="none"/><path d="M12 3c-2 3-3 5.5-3 9s1 6 3 9M12 3c2 3 3 5.5 3 9s-1 6-3 9M3 12h18" stroke={color} strokeWidth="1.3"/></>,
    shield:    <path d="M12 2L4 5v7c0 4.4 3.4 8.5 8 9.5 4.6-1 8-5.1 8-9.5V5l-8-3z" stroke={color} strokeWidth="1.6" fill="none" strokeLinejoin="round"/>,
    plus:      <path d="M12 5v14M5 12h14" stroke={color} strokeWidth="2" strokeLinecap="round"/>,
    close:     <path d="M18 6L6 18M6 6l12 12" stroke={color} strokeWidth="1.8" strokeLinecap="round"/>,
    warning:   <><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke={color} strokeWidth="1.6" fill="none" strokeLinejoin="round"/></>,
    check:     <path d="M5 12l5 5L19 7" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
    copy:      <><rect x="9" y="9" width="13" height="13" rx="2" stroke={color} strokeWidth="1.5" fill="none"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke={color} strokeWidth="1.5"/></>,
    wifi:      <><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0" stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round"/><circle cx="12" cy="20" r="1" fill={color}/></>,
    server:    <><rect x="2" y="2" width="20" height="8" rx="2" stroke={color} strokeWidth="1.5" fill="none"/><rect x="2" y="14" width="20" height="8" rx="2" stroke={color} strokeWidth="1.5" fill="none"/><line x1="6" y1="6" x2="6.01" y2="6" stroke={color} strokeWidth="2" strokeLinecap="round"/><line x1="6" y1="18" x2="6.01" y2="18" stroke={color} strokeWidth="2" strokeLinecap="round"/></>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24">{d[name]}</svg>;
};

/* ══════════════════════════════════════════════════════
   NAV BAR
══════════════════════════════════════════════════════ */
const NavBar = ({ active, onTab }) => {
  const tabs = [
    { id: 'home', label: 'Home' },
    { id: 'servers', label: 'Servers' },
    { id: 'import', label: 'Import' },
    { id: 'settings', label: 'Settings' },
  ];
  return (
    <div style={{ display:'flex', borderTop:`1px solid ${C.border}`, background:C.surface, padding:'6px 0 2px' }}>
      {tabs.map(t => {
        const on = active === t.id;
        return (
          <button key={t.id} onClick={() => onTab(t.id)} style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center',
            gap:3, background:'none', border:'none', cursor:'pointer',
            padding:'4px 0 8px', color: on ? C.accent : C.muted,
          }}>
            {on && <div style={{ width:28, height:3, borderRadius:2, background:C.accent, marginBottom:2 }}/>}
            <Icon name={t.id==='import'?'import':t.id} size={22} color={on?C.accent:C.muted}/>
            <span style={{ fontSize:10, fontWeight:500 }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   PING BAR
══════════════════════════════════════════════════════ */
const PingBar = ({ ping }) => {
  if (ping === null) return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:2 }}>
      {[0,1,2].map(i => (
        <div key={i} style={{ width:3, height:8+i*4, borderRadius:2, background:C.border,
          animation:`ping-pulse 1s ${i*0.2}s ease-in-out infinite` }}/>
      ))}
    </div>
  );
  const color = ping<80?C.accent:ping<180?C.amber:C.danger;
  const bars = ping<80?3:ping<180?2:1;
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:2 }}>
      <div style={{ display:'flex', alignItems:'flex-end', gap:2 }}>
        {[0,1,2].map(i => (
          <div key={i} style={{ width:3, height:8+i*4, borderRadius:2, background:i<bars?color:C.border }}/>
        ))}
      </div>
      <div style={{ fontSize:10, fontWeight:600, color }}>{ping} мс</div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   ONBOARDING
══════════════════════════════════════════════════════ */
const OnboardingScreen = ({ onDone }) => {
  const [step, setStep] = React.useState(0);
  const [url, setUrl] = React.useState('');
  const [proto, setProto] = React.useState(null);

  const protocols = [
    { id:'vless', label:'VLESS', sub:'xRay · TCP/TLS', color:C.blue },
    { id:'awg',   label:'AmneziaWG', sub:'WireGuard обфускация', color:C.awg },
    { id:'hys',   label:'Hysteria2', sub:'QUIC / UDP', color:C.amber },
  ];

  const steps = [
    {
      icon: 'shield',
      title: 'Добро пожаловать',
      sub: 'PaykeyfearVPN защищает ваше соединение.\nДобавьте первый сервер чтобы начать.',
      content: (
        <div style={{ display:'flex', flexDirection:'column', gap:10, width:'100%' }}>
          <textarea value={url} onChange={e=>setUrl(e.target.value)}
            placeholder="vless:// или amnezia://"
            style={{ background:C.surface, border:`1.5px solid ${url?C.accent:C.border}`,
              borderRadius:14, padding:14, color:C.text, fontSize:12,
              fontFamily:'monospace', resize:'none', height:90, outline:'none',
              lineHeight:1.6, width:'100%', boxSizing:'border-box', transition:'border-color 0.2s' }}/>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ flex:1, height:1, background:C.border }}/>
            <span style={{ fontSize:10, color:C.muted }}>ИЛИ</span>
            <div style={{ flex:1, height:1, background:C.border }}/>
          </div>
          <button style={{ padding:'12px', borderRadius:12, border:`1px solid ${C.border}`,
            background:C.surface, color:C.muted, fontSize:13, fontWeight:500,
            fontFamily:'Space Grotesk,sans-serif', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
            <Icon name="qr" size={18} color={C.accent}/> Сканировать QR-код
          </button>
        </div>
      ),
      canNext: url.trim().length > 4,
      nextLabel: 'Далее',
    },
    {
      icon: 'server',
      title: 'Выберите протокол',
      sub: 'Укажите тип вашего сервера.',
      content: (
        <div style={{ display:'flex', flexDirection:'column', gap:8, width:'100%' }}>
          {protocols.map(p => (
            <button key={p.id} onClick={() => setProto(p.id)} style={{
              display:'flex', alignItems:'center', gap:14, padding:'13px 14px',
              borderRadius:14, border:'none', cursor:'pointer', textAlign:'left',
              fontFamily:'Space Grotesk,sans-serif',
              background: proto===p.id ? `color-mix(in oklch, ${p.color} 12%, ${C.surface})` : C.surface,
              boxShadow: proto===p.id ? `0 0 0 1.5px ${p.color}` : `0 0 0 1px ${C.border}`,
              transition:'all 0.15s',
            }}>
              <div style={{ width:38, height:38, borderRadius:10, flexShrink:0,
                background:`color-mix(in oklch, ${p.color} 18%, transparent)`,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name="globe" size={18} color={p.color}/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:600, color:proto===p.id?p.color:C.text }}>{p.label}</div>
                <div style={{ fontSize:11, color:C.muted, marginTop:1 }}>{p.sub}</div>
              </div>
              {proto===p.id && <Icon name="check" size={18} color={p.color}/>}
            </button>
          ))}
        </div>
      ),
      canNext: !!proto,
      nextLabel: 'Готово',
    },
    {
      icon: 'check',
      title: 'Всё готово!',
      sub: 'Сервер добавлен. Нажмите кнопку ниже чтобы подключиться.',
      content: (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16, width:'100%' }}>
          <div style={{ width:72, height:72, borderRadius:'50%',
            background:`color-mix(in oklch, ${C.accent} 15%, ${C.surface})`,
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow:`0 0 0 1.5px ${C.accent}, 0 0 30px oklch(0.5 0.14 165/0.3)` }}>
            <Icon name="check" size={32} color={C.accent}/>
          </div>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:13, color:C.muted }}>Сервер: <span style={{ color:C.accent }}>@Paykeyfear</span></div>
            <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>
              {protocols.find(p=>p.id===proto)?.label||'VLESS'} · {maskIP('138.124.28.204:443')}
            </div>
          </div>
        </div>
      ),
      canNext: true,
      nextLabel: 'Подключиться',
    },
  ];

  const s = steps[step];

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', background:C.bg, overflow:'hidden' }}>
      {/* Progress dots */}
      <div style={{ display:'flex', justifyContent:'center', gap:6, paddingTop:20 }}>
        {steps.map((_,i) => (
          <div key={i} style={{ width: i===step?20:6, height:6, borderRadius:3,
            background: i<=step?C.accent:C.border, transition:'all 0.3s' }}/>
        ))}
      </div>

      {/* Skip */}
      {step < 2 && (
        <button onClick={onDone} style={{ position:'absolute', top:36, right:16,
          background:'none', border:'none', color:C.muted, fontSize:12,
          fontFamily:'Space Grotesk,sans-serif', cursor:'pointer' }}>
          Пропустить
        </button>
      )}

      {/* Icon */}
      <div style={{ display:'flex', justifyContent:'center', paddingTop:28, paddingBottom:20 }}>
        <div style={{ width:64, height:64, borderRadius:18,
          background:`color-mix(in oklch, ${C.accent} 12%, ${C.surface})`,
          display:'flex', alignItems:'center', justifyContent:'center',
          boxShadow:`0 0 0 1px ${C.accentDim}` }}>
          <Icon name={s.icon} size={28} color={C.accent}/>
        </div>
      </div>

      {/* Text */}
      <div style={{ textAlign:'center', padding:'0 24px 20px' }}>
        <div style={{ fontSize:20, fontWeight:700, color:C.text, letterSpacing:'-0.02em' }}>{s.title}</div>
        <div style={{ fontSize:12, color:C.muted, marginTop:6, lineHeight:1.6, whiteSpace:'pre-line' }}>{s.sub}</div>
      </div>

      {/* Step content */}
      <div style={{ flex:1, padding:'0 16px', display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'flex-start', overflowY:'auto' }}>
        {s.content}
      </div>

      {/* Next button */}
      <div style={{ padding:'16px 16px 20px' }}>
        <button
          onClick={() => { if(step<steps.length-1) setStep(step+1); else onDone(); }}
          disabled={!s.canNext}
          style={{
            width:'100%', padding:'15px', borderRadius:16, border:'none',
            cursor:s.canNext?'pointer':'default',
            background: s.canNext
              ? `linear-gradient(135deg, ${C.accent}, oklch(0.65 0.18 195))`
              : 'oklch(0.17 0.01 255)',
            boxShadow: s.canNext ? `0 4px 24px oklch(0.50 0.14 165 / 0.3)` : 'none',
            color: s.canNext?'#000':C.muted, fontSize:15, fontWeight:700,
            fontFamily:'Space Grotesk,sans-serif', transition:'all 0.2s',
          }}>{s.nextLabel}</button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   ERROR BOTTOM SHEET
══════════════════════════════════════════════════════ */
const ErrorSheet = ({ onClose, onRetry }) => (
  <div style={{ position:'absolute', inset:0, zIndex:50 }}>
    {/* Overlay */}
    <div onClick={onClose} style={{ position:'absolute', inset:0,
      background:'rgba(0,0,0,0.55)', animation:'fade-in 0.2s ease' }}/>
    {/* Sheet */}
    <div style={{ position:'absolute', bottom:0, left:0, right:0,
      background:C.surface, borderRadius:'20px 20px 0 0',
      padding:'8px 20px 28px', animation:'sheet-up 0.3s cubic-bezier(0.32,0.72,0,1)' }}>
      {/* Handle */}
      <div style={{ width:36, height:4, borderRadius:2, background:C.border,
        margin:'0 auto 20px' }}/>
      {/* Icon */}
      <div style={{ display:'flex', justifyContent:'center', marginBottom:14 }}>
        <div style={{ width:56, height:56, borderRadius:'50%',
          background:C.dangerDim, display:'flex', alignItems:'center', justifyContent:'center',
          boxShadow:`0 0 0 1px ${C.danger}40` }}>
          <Icon name="warning" size={26} color={C.danger}/>
        </div>
      </div>
      <div style={{ textAlign:'center', marginBottom:20 }}>
        <div style={{ fontSize:17, fontWeight:700, color:C.text }}>Ошибка подключения</div>
        <div style={{ fontSize:13, color:C.muted, marginTop:6, lineHeight:1.5 }}>
          Сервер недоступен. Проверьте конфигурацию или попробуйте другой сервер.
        </div>
        <div style={{ marginTop:10, padding:'8px 14px', borderRadius:10,
          background:'oklch(0.13 0.01 255)', border:`1px solid ${C.border}`,
          display:'inline-flex', alignItems:'center', gap:8 }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:C.danger, flexShrink:0 }}/>
          <span style={{ fontSize:11, color:C.muted, fontFamily:'monospace' }}>
            connection_timeout · 30s
          </span>
        </div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <button onClick={onRetry} style={{ padding:'14px', borderRadius:14, border:'none',
          background:`linear-gradient(135deg, ${C.accent}, oklch(0.65 0.18 195))`,
          color:'#000', fontSize:14, fontWeight:700,
          fontFamily:'Space Grotesk,sans-serif', cursor:'pointer' }}>
          Повторить попытку
        </button>
        <button onClick={onClose} style={{ padding:'12px', borderRadius:14, border:`1px solid ${C.border}`,

const HomeScreen = ({ connected, onToggle, onError }) => {
  const [phase, setPhase] = React.useState(connected ? 'on' : 'off');
  const [seconds, setSeconds] = React.useState(0);

  // session timer
  React.useEffect(() => {
    if (phase !== 'on') { setSeconds(0); return; }
    const iv = setInterval(() => setSeconds(s => s+1), 1000);
    return () => clearInterval(iv);
  }, [phase]);

  const handleToggle = () => {
    if (phase === 'on') {
      setPhase('disconnecting');
      setTimeout(() => { setPhase('off'); onToggle(); }, 1600);
    } else if (phase === 'off') {
      setPhase('connecting');
      // randomly show error 30% of time for demo
      const willError = false; // set true to demo error sheet
      setTimeout(() => {
        if (willError) { setPhase('off'); onError(); }
        else { setPhase('on'); onToggle(); }
      }, 2000);
    }
  };

  const isOn  = phase === 'on';
  const isTrans = phase === 'connecting' || phase === 'disconnecting';
  const statusColor = isOn ? C.accent : isTrans ? C.amber : C.muted;
  const statusText  = { on:'● Connected · VLESS', off:'○ Disconnected',
    connecting:'◎ Подключение…', disconnecting:'◎ Отключение…' }[phase];

  return (

          letterSpacing:'0.03em', transition:'color 0.3s' }}>{statusText}</div>

          <div style={{ fontSize:12, color:C.muted, marginTop:2, fontVariantNumeric:'tabular-nums' }}>
            {fmtTime(seconds)}

        <div style={{ position:'relative', width:168, height:168 }}>
          {isOn && <>
            <div style={{ position:'absolute', inset:0, borderRadius:'50%',
              border:`2px solid ${C.accent}`, animation:'pulse-ring 2.4s ease-out infinite' }}/>
            <div style={{ position:'absolute', inset:0, borderRadius:'50%',
              border:`2px solid ${C.accent}`, animation:'pulse-ring2 2.4s ease-out 0.6s infinite' }}/>
          </>}
          {isTrans && (
            <svg style={{ position:'absolute', inset:0, animation:'spin-arc 1s linear infinite' }}
              width="168" height="168" viewBox="0 0 168 168">

          <button onClick={handleToggle} disabled={isTrans} style={{

              : `radial-gradient(circle at 35% 30%, oklch(0.20 0.02 255), oklch(0.13 0.02 255))`,
            boxShadow: isOn

          {hasText ? (<>

              <path d="M12 4v12m0 0l-4-4m4 4l4-4" stroke="#000" strokeWidth="2.2" strokeLinecap="round" fill="none"/>
              <path d="M4 20h16" stroke="#000" strokeWidth="2.2" strokeLinecap="round"/>
            </svg>
            Импортировать
          </>) : 'Выберите метод или вставьте ссылку'}
        </button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   SETTINGS SCREEN
══════════════════════════════════════════════════════ */
const SettingsScreen = () => {
  const [dynTheme, setDynTheme] = React.useState(true);
  const [autoConnect, setAutoConnect] = React.useState(false);
  const rows = [
    { label:'Динамическая тема', sub:'Использовать палитру Material You из системы', toggle:true, val:dynTheme, set:setDynTheme },
    { label:'Подключаться при загрузке', sub:'Автоматически запускать туннель после перезагрузки', toggle:true, val:autoConnect, set:setAutoConnect },
    { label:'Раздельный туннель', sub:'Выберите приложения, трафик которых идёт через VPN', arrow:true },
    { label:'Политика конфиденциальности', sub:'Что PaykeyfearVPN делает с вашими данными', arrow:true },
    { label:'Журнал', sub:'Последние записи журнала в памяти', arrow:true },
    { label:'О приложении', sub:'Версия 0.1.0-debug', arrow:true },
  ];
  return (
    <div style={{ flex:1, background:C.bg, overflowY:'auto' }}>
      <div style={{ padding:'20px 16px 8px', fontSize:18, fontWeight:700, color:C.text }}>Настройки</div>
      {rows.map((r,i) => (
        <div key={i} style={{ padding:'14px 16px', borderBottom:`1px solid ${C.border}`,
          display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:14, fontWeight:500, color:C.text }}>{r.label}</div>
            <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{r.sub}</div>
          </div>
          {r.toggle && (
            <div onClick={() => r.set(!r.val)} style={{ cursor:'pointer' }}>
              <svg width="48" height="24" viewBox="0 0 24 12">
                <rect x="0" y="0" width="24" height="12" rx="6" fill={r.val?C.accent:'oklch(0.25 0.01 250)'}/>
                <circle cx={r.val?"18":"6"} cy="6" r="4.5" fill="white"/>
              </svg>
            </div>
          )}
          {r.arrow && <Icon name="arrow" size={18} color={C.muted}/>}
        </div>
      ))}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════ */
const App = () => {
  const [tab, setTab] = React.useState('home');
  const [connected, setConnected] = React.useState(true);
  const [showError, setShowError] = React.useState(false);
  const [detailServer, setDetailServer] = React.useState(null);

  return (
    <AndroidDevice dark={true}>
      <div style={{ height:'100%', display:'flex', flexDirection:'column',
        background:C.bg, fontFamily:'Space Grotesk,sans-serif', position:'relative' }}>
        {{ home:<HomeScreen connected={connected} onToggle={()=>setConnected(c=>!c)} onError={()=>setShowError(true)}/>,
           servers:<ServersScreen onDetail={setDetailServer}/>,
           import:<ImportScreen/>,
           settings:<SettingsScreen/> }[tab]}
        <NavBar active={tab} onTab={setTab}/>
        {showError && <ErrorSheet onClose={()=>setShowError(false)} onRetry={()=>setShowError(false)}/>}
        {detailServer && <ServerDetailSheet server={detailServer} onClose={()=>setDetailServer(null)}
          onConnect={()=>setConnected(true)}/>}
      </div>
    </AndroidDevice>
  );
};

/* ══════════════════════════════════════════════════════
   ANDROID WIDGET
══════════════════════════════════════════════════════ */
const Widget = ({ connected }) => (
  <div style={{ width:320, background:'oklch(0.13 0.02 255)',
    borderRadius:20, padding:'14px 18px', border:`1px solid ${C.border}`,
    boxShadow:'0 8px 32px rgba(0,0,0,0.4)',
    display:'flex', alignItems:'center', gap:14, fontFamily:'Space Grotesk,sans-serif' }}>
    {/* Icon */}
    <div style={{ width:48, height:48, borderRadius:14, flexShrink:0,
      background: connected
        ? `radial-gradient(circle at 35% 30%, oklch(0.25 0.12 165), oklch(0.14 0.08 165))`
        : 'oklch(0.18 0.02 255)',
      display:'flex', alignItems:'center', justifyContent:'center',
      boxShadow: connected?`0 0 0 1px ${C.accentDim}, 0 0 16px oklch(0.5 0.14 165/0.3)`:undefined }}>
      <Icon name={connected?'lock':'unlock'} size={22} color={connected?C.accent:C.muted}/>
    </div>
    {/* Text */}
    <div style={{ flex:1 }}>
      <div style={{ fontSize:13, fontWeight:700, color:C.text }}>PaykeyfearVPN</div>
      <div style={{ fontSize:11, color:connected?C.accent:C.muted, marginTop:2 }}>
        {connected ? '● Подключено · VLESS' : '○ Отключено'}
      </div>
      {connected && (
        <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>
          ↓ 528 МиБ &nbsp; ↑ 394 МиБ
        </div>
      )}
    </div>
    {/* Toggle button */}
    <button style={{ padding:'8px 14px', borderRadius:10, border:'none', cursor:'pointer',
      background: connected
        ? `linear-gradient(135deg, ${C.accent}, oklch(0.65 0.18 195))`
        : C.surface,
      color: connected?'#000':C.muted, fontSize:11, fontWeight:600,
      fontFamily:'Space Grotesk,sans-serif',
      boxShadow: connected?`0 2px 12px oklch(0.5 0.14 165/0.3)`:undefined }}>
      {connected ? 'Откл.' : 'Вкл.'}
    </button>
  </div>
);

/* ══════════════════════════════════════════════════════
   APP ICON
══════════════════════════════════════════════════════ */
const AppIcon = ({ size=120, r=28 }) => (
  <div style={{ width:size, height:size, borderRadius:r,
    background:'linear-gradient(145deg, oklch(0.15 0.04 255), oklch(0.08 0.03 265))',
    display:'flex', alignItems:'center', justifyContent:'center',
    position:'relative', overflow:'hidden',
    boxShadow:`0 8px 40px oklch(0.5 0.14 165/0.3), 0 2px 8px #000a` }}>
    <div style={{ position:'absolute', width:size*0.75, height:size*0.75,
      borderRadius:'50%', top:-size*0.15, left:-size*0.15,
      background:'oklch(0.76 0.17 165/0.12)', filter:'blur(20px)' }}/>
    <svg width={size*0.62} height={size*0.62} viewBox="0 0 64 64">
      <path d="M32 4L8 14v18c0 12 10 22 24 28 14-6 24-16 24-28V14L32 4z"
        fill="none" stroke="oklch(0.76 0.17 165)" strokeWidth="2.5" strokeLinejoin="round"/>
      <path d="M32 4L8 14v18c0 12 10 22 24 28 14-6 24-16 24-28V14L32 4z"
        fill="oklch(0.76 0.17 165/0.12)"/>
      <circle cx="32" cy="28" r="7" fill="none" stroke="oklch(0.76 0.17 165)" strokeWidth="2.2"/>
      <rect x="29" y="33" width="6" height="10" rx="2" fill="oklch(0.76 0.17 165)"/>
      <circle cx="32" cy="28" r="3" fill="oklch(0.76 0.17 165)"/>
    </svg>
  </div>
);

/* ══════════════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════════════ */
const Root = () => {
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:48, justifyContent:'center',
      alignItems:'flex-start', width:'100%' }}>

      {/* ── Col 1: Main app ── */}
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
        <App/>
        <div className="label">Главный экран · Интерактивный</div>
      </div>

      {/* ── Col 3: Extras ── */}
      <div style={{ display:'flex', flexDirection:'column', gap:28, alignItems:'center' }}>
        {/* Icon sizes */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:10 }}>
          <div style={{ display:'flex', gap:16, alignItems:'flex-end' }}>
            <AppIcon size={48} r={12}/>
            <AppIcon size={72} r={18}/>
            <AppIcon size={96} r={22}/>
            <AppIcon size={120} r={28}/>
          </div>
          <div className="label">Иконка — 48 / 72 / 96 / 120 px</div>
        </div>

        {/* Widget connected */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
          <div style={{ fontSize:11, color:C.muted, fontWeight:500, letterSpacing:'0.06em',
            textTransform:'uppercase', marginBottom:2 }}>Виджет Android</div>
          <Widget connected={true}/>
          <Widget connected={false}/>
          <div className="label">4×1 Home Screen Widget</div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
<div id="root"></div>
</body>
</html>
