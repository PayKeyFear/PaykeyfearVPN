<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaykeyfearVPN — Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0c14;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Grotesk', sans-serif;
  overflow: hidden;
}

/* ── Phone shell ── */
.phone {
  width: 320px;
  height: 680px;
  background: #0a0c14;
  border-radius: 44px;
  border: 7px solid rgba(116,119,117,0.4);
  box-shadow: 0 40px 100px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Background radial glow ── */
.bg-glow {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 40%, rgba(80,220,160,0.08) 0%, transparent 70%);
  pointer-events: none;
}

/* ── Grid lines ── */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(80,220,160,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(80,220,160,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  opacity: 0;
  animation: grid-fade 0.8s 0.4s ease forwards;
}

/* ── Content ── */
.content {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  z-index: 2;
}

/* ── Shield SVG wrapper ── */
.shield-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Outer spinning dashes */
.ring-spin {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px dashed rgba(80,220,160,0.25);
  animation: spin 12s linear infinite;
  opacity: 0;
  animation: spin 12s linear infinite, ring-appear 0.6s 0.6s ease forwards;
}
.ring-spin-2 {
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 1px solid rgba(80,220,160,0.12);
  animation: spin-rev 8s linear infinite, ring-appear 0.6s 0.9s ease forwards;
  opacity: 0;
}

/* Pulse rings */
.pulse {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1.5px solid rgba(80,220,160,0.5);
  animation: pulse-out 2.6s 1.8s ease-out infinite;
  opacity: 0;
}
.pulse-2 {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1px solid rgba(80,220,160,0.3);
  animation: pulse-out 2.6s 2.4s ease-out infinite;
  opacity: 0;
}

/* Shield icon */
.shield-svg {
  opacity: 0;
  transform: scale(0.7) translateY(10px);
  animation: shield-enter 0.7s 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  filter: drop-shadow(0 0 16px rgba(80,220,160,0.4));
}

/* ── Scan line ── */
.scan {
  position: absolute;
  left: 18px;
  right: 18px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(80,220,160,0.8), transparent);
  border-radius: 2px;
  top: 22px;
  animation: scan-down 1.4s 0.9s ease-in-out forwards;
  opacity: 0;
}

/* ── Text ── */
.app-name {
  margin-top: 28px;
  font-size: 22px;
  font-weight: 700;
  color: rgba(245,248,250,0.95);
  letter-spacing: -0.03em;
  opacity: 0;
  transform: translateY(8px);
  animation: text-up 0.5s 1.1s ease forwards;
}
.tagline {
  margin-top: 6px;
  font-size: 12px;
  font-weight: 500;
  color: rgba(80,220,160,0.8);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(6px);
  animation: text-up 0.5s 1.3s ease forwards;
}

/* ── Progress bar ── */
.progress-track {
  margin-top: 52px;
  width: 140px;
  height: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  animation: text-up 0.4s 1.5s ease forwards;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, rgba(80,220,160,0.6), rgba(80,220,160,1));
  border-radius: 2px;
  animation: progress-grow 1.8s 1.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  box-shadow: 0 0 8px rgba(80,220,160,0.5);
}

.status-text {
  margin-top: 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.04em;
  opacity: 0;
  animation: text-up 0.4s 1.6s ease forwards;
}

/* ── Particles ── */
.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(80,220,160,0.6);
}

/* ── Keyframes ── */
@keyframes grid-fade {
  to { opacity: 1; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes spin-rev {
  from { transform: rotate(0deg); }
  to   { transform: rotate(-360deg); }
}
@keyframes ring-appear {
  to { opacity: 1; }
}
@keyframes pulse-out {
  0%   { transform: scale(1); opacity: 0.6; }
  70%  { transform: scale(1.4); opacity: 0; }
  100% { transform: scale(1.4); opacity: 0; }
}
@keyframes shield-enter {
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes scan-down {
  0%   { opacity: 1; top: 22px; }
  100% { opacity: 0; top: 110px; }
}
@keyframes text-up {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes progress-grow {
  to { width: 100%; }
}
@keyframes float-up {
  0%   { transform: translateY(0) scale(1); opacity: 0.7; }
  100% { transform: translateY(-90px) scale(0); opacity: 0; }
}
</style>
</head>
<body>

<div class="phone">
  <div class="bg-glow"></div>
  <div class="grid"></div>

  <!-- Floating particles (created by JS) -->
  <div class="particles" id="particles"></div>

  <div class="content">
    <!-- Shield -->
    <div class="shield-wrap">
      <div class="ring-spin"></div>
      <div class="ring-spin-2"></div>
      <div class="pulse"></div>
      <div class="pulse-2"></div>

      <svg class="shield-svg" width="88" height="100" viewBox="0 0 88 100">
        <!-- Shield body fill -->
        <path d="M44 2L4 18v28c0 26 18 48 40 54 22-6 40-28 40-54V18L44 2z"
          fill="rgba(80,220,160,0.12)"
          stroke="rgba(80,220,160,0.9)" stroke-width="3.5"
          stroke-linejoin="round"/>
        <!-- Inner shield line -->
        <path d="M44 10L10 24v22c0 22 14 40 34 46 20-6 34-24 34-46V24L44 10z"
          fill="none"
          stroke="rgba(80,220,160,0.18)" stroke-width="1.5"
          stroke-linejoin="round"/>
        <!-- Keyhole circle -->
        <circle cx="44" cy="40" r="13"
          fill="none" stroke="rgba(80,220,160,0.95)" stroke-width="3"/>
        <!-- Keyhole dot -->
        <circle cx="44" cy="40" r="5" fill="rgba(80,220,160,1)"/>
        <!-- Keyhole stem -->
        <rect x="37.5" y="51" width="13" height="20" rx="3.5" fill="rgba(80,220,160,1)"/>
      </svg>

      <!-- Scan line -->
      <div class="scan"></div>
    </div>

    <div class="app-name">PaykeyfearVPN</div>
    <div class="tagline">Secure · Private · Free</div>

    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <div class="status-text" id="statusText">Инициализация…</div>
  </div>
</div>

<script>
// ── Cycling status text ──────────────────────────────────────────────
const statuses = [
  'Инициализация…',
  'Загрузка конфигурации…',
  'Проверка ключей…',
  'Готово',
];
let si = 0;
const el = document.getElementById('statusText');
setTimeout(() => {
  const iv = setInterval(() => {
    si++;
    if (si >= statuses.length) { clearInterval(iv); return; }
    el.style.opacity = '0';
    setTimeout(() => {
      el.textContent = statuses[si];
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = '0.25';
    }, 200);
  }, 600);
}, 1700);

// ── Floating particles ───────────────────────────────────────────────
const container = document.getElementById('particles');
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const x = 60 + Math.random() * 200;
  const y = 200 + Math.random() * 280;
  p.style.left = x + 'px';
  p.style.top = y + 'px';
  p.style.opacity = 0;
  p.style.animation = `float-up ${1.4 + Math.random() * 1.2}s ease-out forwards`;
  p.style.animationDelay = (Math.random() * 0.3) + 's';
  container.appendChild(p);
  setTimeout(() => p.remove(), 2800);
}

// Start spawning after shield appears
setTimeout(() => {
  spawnParticle();
  const iv2 = setInterval(spawnParticle, 320);
  setTimeout(() => clearInterval(iv2), 3500);
}, 1200);

// ── Replay on click ──────────────────────────────────────────────────
document.querySelector('.phone').addEventListener('click', () => {
  window.location.reload();
});
</script>
</body>
</html>
