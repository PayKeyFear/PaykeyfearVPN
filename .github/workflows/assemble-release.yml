name: Assemble release with native backends

# End-to-end release pipeline:
#
#   1. Run `native-backends.yml` in-workflow to rebuild the three .aars
#      from source (no pre-built binaries trusted).
#   2. Drop the .aars into `protocols/*/libs/`.
#   3. Run release unit tests, then produce a signed AAB + APK exactly
#      the same way `release.yml` does for tag builds.
#
# Triggered:
#   - manually via `workflow_dispatch` (any branch) for smoke tests;
#   - automatically on `v*` tag pushes so every tagged release ships
#     a bundle that actually contains working native backends.
#
# The keystore is read from the same secrets as `release.yml`:
# RELEASE_KEYSTORE_BASE64 + RELEASE_KEYSTORE_PASSWORD + RELEASE_KEY_ALIAS
# + RELEASE_KEY_PASSWORD. When the keystore secret is missing, the job
# falls back to the debug signing config (so PR smoke tests still work).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  bundle:
    name: Build signed AAB + APK with .aar backends
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r26d
        id: ndk
        # nttld/setup-ndk ships broken clang wrappers on ubuntu-latest
        # (the toolchain shim scripts reference ./clang relative to a
        # different layout than what actually gets extracted — gomobile
        # bind dies with "No such file or directory" on first invocation
        # of armv7a-linux-androideabi26-clang). Use sdkmanager instead:
        # it always installs the official NDK in a well-known location
        # under $ANDROID_HOME/ndk/<version>.
        run: |
          set -euo pipefail
          NDK_VERSION=26.3.11579264
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;${NDK_VERSION}"
          NDK_PATH="$ANDROID_HOME/ndk/${NDK_VERSION}"
          test -x "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          echo "ndk-path=$NDK_PATH" >> "$GITHUB_OUTPUT"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> "$GITHUB_ENV"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: gomobile init

      - name: Build native .aars
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          chmod +x scripts/build-native.sh
          ./scripts/build-native.sh --force

      - name: Verify umbrella .aar present
        run: |
          set -e
          aar=protocols/awg/libs/paykeyfearnative.aar
          if [ ! -f "$aar" ]; then
            echo "::error::Missing $aar"
            exit 1
          fi
          ls -la "$aar"
          # Sanity-check the .aar actually contains the bundle class +
          # native libs. If gomobile silently produced an empty .aar
          # (we saw this when a sub-module's go.mod tidy failed) the
          # APK will still build but every protocol will noop on-device.
          unzip -l "$aar" | tee /tmp/aar.list
          if ! grep -q 'classes.jar' /tmp/aar.list; then
            echo "::error::umbrella .aar missing classes.jar"; exit 1
          fi
          if ! grep -q 'jni/arm64-v8a/libgojni.so' /tmp/aar.list; then
            echo "::error::umbrella .aar missing jni/arm64-v8a/libgojni.so"; exit 1
          fi

      - name: Decode keystore (if provided)
        id: keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::warning::RELEASE_KEYSTORE_BASE64 secret not set; build will use the debug signing config."
            echo "signed=false" >> "$GITHUB_OUTPUT"
          else
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/release.jks"
            echo "PAYKEYFEAR_KEYSTORE_PATH=$GITHUB_WORKSPACE/release.jks" >> "$GITHUB_ENV"
            echo "signed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant execute on gradlew
        run: chmod +x ./gradlew

      - name: Release unit tests
        run: ./gradlew testReleaseUnitTest --no-daemon

      - name: Assemble release AAB + APK
        env:
          PAYKEYFEAR_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          PAYKEYFEAR_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          PAYKEYFEAR_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :app:assembleRelease --no-daemon

      - name: Verify native libs packaged into APK
        run: |
          set -e
          apk=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          echo "Inspecting $apk"
          unzip -l "$apk" | tee /tmp/apk.list
          if ! grep -q 'lib/arm64-v8a/libgojni.so' /tmp/apk.list; then
            echo "::error::libgojni.so not in APK — native backends will noop"
            exit 1
          fi
          # The umbrella bundle class must survive R8. If this grep
          # fails, the APK will build but every protocol will fall
          # back to noop on-device (what commit b51dd86 tried to fix).
          if ! unzip -p "$apk" classes.dex | strings | grep -q paykeyfearnative/Paykeyfearnative; then
            # Multi-dex: scan every classes*.dex. `strings` works even
            # on raw dex bytes.
            found=0
            for d in $(unzip -Z1 "$apk" 'classes*.dex'); do
              if unzip -p "$apk" "$d" | strings | grep -q paykeyfearnative/Paykeyfearnative; then
                found=1; break
              fi
            done
            if [ "$found" != "1" ]; then
              echo "::error::paykeyfearnative.Paykeyfearnative not found in any DEX"
              exit 1
            fi
          fi
          echo "✓ APK contains native backend"

      - name: Upload bundle + APK
        uses: actions/upload-artifact@v4
        with:
          name: paykeyfear-${{ github.ref_name }}-native
          path: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk

      - name: Upload umbrella .aar (for audit)
        uses: actions/upload-artifact@v4
        with:
          name: native-backend-${{ github.ref_name }}
          path: protocols/awg/libs/paykeyfearnative.aar

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.keystore.outputs.signed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
